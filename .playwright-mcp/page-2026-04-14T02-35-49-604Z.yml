      - article [ref=e41]:
        - paragraph [ref=e42]: I am a Systems Analyst and currently in my final year of a Systems Engineering degree. I am passionate about technology, especially its ability to create innovative solutions that generate real value and solve real-world problems.
        - paragraph [ref=e43]: I am particularly interested in focusing my professional career on software architecture and system design, building robust and scalable solutions by applying software engineering principles and best practices such as Clean Architecture. My goal is to develop maintainable, decoupled systems that can evolve over time.
        - paragraph [ref=e44]: "In my projects, I approach development end-to-end: from business requirements analysis and problem understanding, to architecture design, data modeling, and business logic implementation. I enjoy transforming ideas and needs into well-structured technical solutions."
        - paragraph [ref=e45]: I am especially motivated by solving complex problems, optimizing processes, and designing efficient and reliable systems in real-world environments where technology has a tangible impact.
        - paragraph [ref=e46]: I consider myself a curious, creative, and proactive person, with strong critical thinking skills and a continuous learning mindset, which allows me to quickly adapt to new challenges and technologies.
